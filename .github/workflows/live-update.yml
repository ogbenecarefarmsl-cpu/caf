name: Deploy Live Update

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.config.ts'
      - 'capacitor.config.ts'
      - '.github/workflows/live-update.yml'

permissions:
  contents: write

env:
  LIVE_UPDATE_TAG: live-update

jobs:
  deploy-live-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate mobile backend configuration
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "VITE_API_URL secret is missing. Set it to your production backend API URL."
            exit 1
          fi
          if echo "$VITE_API_URL" | grep -Eiq 'localhost|127\.0\.0\.1|10\.0\.2\.2'; then
            echo "VITE_API_URL points to a local address. Mobile bundles must use a public backend URL."
            exit 1
          fi
          if [ -z "$VITE_WS_URL" ]; then
            echo "VITE_WS_URL secret is missing. Set it to your production websocket URL."
            exit 1
          fi
          if echo "$VITE_WS_URL" | grep -Eiq 'localhost|127\.0\.0\.1|10\.0\.2\.2'; then
            echo "VITE_WS_URL points to a local address. Mobile bundles must use a public websocket URL."
            exit 1
          fi

      - name: Build web assets
        run: pnpm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
          VITE_ENABLE_OFFLINE: ${{ secrets.VITE_ENABLE_OFFLINE || 'true' }}
          VITE_ENABLE_LIVE_UPDATES: ${{ secrets.VITE_ENABLE_LIVE_UPDATES || 'true' }}
          VITE_LIVE_UPDATE_CHANNEL: ${{ secrets.VITE_LIVE_UPDATE_CHANNEL || 'production' }}
          VITE_LIVE_UPDATE_MANIFEST_URL: ${{ secrets.VITE_LIVE_UPDATE_MANIFEST_URL || format('https://github.com/{0}/releases/download/live-update/latest.json', github.repository) }}

      - name: Package live update bundle
        env:
          LIVE_UPDATE_VERSION: ${{ github.run_number }}.${{ github.run_attempt }}.0
        run: |
          npx @capgo/cli@latest bundle zip com.caf.pharmacy \
            --path dist \
            --bundle "$LIVE_UPDATE_VERSION" \
            --name "caf-live-update-$LIVE_UPDATE_VERSION.zip" \
            --no-code-check

          mkdir -p live-update-release
          mv "caf-live-update-$LIVE_UPDATE_VERSION.zip" live-update-release/

          cat > live-update-release/latest.json << EOF
          {
            "version": "$LIVE_UPDATE_VERSION",
            "url": "https://github.com/${{ github.repository }}/releases/download/$LIVE_UPDATE_TAG/caf-live-update-$LIVE_UPDATE_VERSION.zip",
            "releaseNotes": "Live web update from ${{ github.sha }}",
            "mandatory": false
          }
          EOF

      - name: Publish live update release
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN || github.token }}
        run: |
          gh release delete "$LIVE_UPDATE_TAG" --yes --cleanup-tag || true
          gh release create "$LIVE_UPDATE_TAG" \
            live-update-release/latest.json \
            live-update-release/*.zip \
            --target "$GITHUB_SHA" \
            --title "CAREFARM POS live update ${{ github.run_number }}.${{ github.run_attempt }}.0" \
            --notes "Live web bundle for $GITHUB_SHA." \
            --latest=false
