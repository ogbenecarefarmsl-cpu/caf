name: Deploy Live Update to Capgo

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.config.ts'
      - 'capacitor.config.ts'
      - '.github/workflows/live-update.yml'

jobs:
  deploy-live-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate mobile backend configuration
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "VITE_API_URL secret is missing. Set it to your production backend API URL, for example https://carefam-00c1641bcdf9.herokuapp.com/api"
            exit 1
          fi

          if echo "$VITE_API_URL" | grep -Eiq 'localhost|127\.0\.0\.1|10\.0\.2\.2'; then
            echo "VITE_API_URL points to a local address. Mobile bundles must use a public backend URL."
            exit 1
          fi

          if [ -z "$VITE_WS_URL" ]; then
            echo "VITE_WS_URL secret is missing. Set it to your production websocket URL, for example wss://carefam-00c1641bcdf9.herokuapp.com/inventory"
            exit 1
          fi

          if echo "$VITE_WS_URL" | grep -Eiq 'localhost|127\.0\.0\.1|10\.0\.2\.2'; then
            echo "VITE_WS_URL points to a local address. Mobile bundles must use a public websocket URL."
            exit 1
          fi

      - name: Build web assets
        run: pnpm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
          VITE_ENABLE_OFFLINE: ${{ secrets.VITE_ENABLE_OFFLINE || 'true' }}
          VITE_ENABLE_LIVE_UPDATES: ${{ secrets.VITE_ENABLE_LIVE_UPDATES || 'true' }}
          VITE_LIVE_UPDATE_CHANNEL: ${{ secrets.VITE_LIVE_UPDATE_CHANNEL || 'production' }}

      - name: Deploy to Capgo
        run: |
          if [ -z "$CAPGO_API_KEY" ]; then
            echo "CAPGO_API_KEY secret is missing."
            exit 1
          fi

          echo "Uploading Capgo bundle for app $CAPGO_APP_ID on channel $CAPGO_CHANNEL"

          npx @capgo/cli@latest bundle upload "$CAPGO_APP_ID" \
            --path dist \
            --channel "$CAPGO_CHANNEL" \
            --bundle "${{ github.run_number }}.${{ github.run_attempt }}.0" \
            --apikey "$CAPGO_API_KEY"
        env:
          CAPGO_API_KEY: ${{ secrets.CAPGO_API_KEY }}
          CAPGO_APP_ID: ${{ secrets.CAPGO_APP_ID || vars.CAPGO_APP_ID || 'com.caf.pharmacy' }}
          CAPGO_CHANNEL: ${{ secrets.VITE_LIVE_UPDATE_CHANNEL || vars.VITE_LIVE_UPDATE_CHANNEL || 'production' }}
