name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type: release (signed) or debug'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
      upload_to_capgo:
        description: 'Publish web bundle to Capgo after build?'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  BUILD_TYPE: ${{ github.event.inputs.build_type || 'release' }}
  ANDROID_VERSION_CODE: ${{ github.run_number }}
  ANDROID_VERSION_NAME: 1.0.${{ github.run_number }}
  APK_MANIFEST_URL: https://github.com/${{ github.repository }}/releases/download/android-latest/apk-update.json
  R2_APK_KEY_PREFIX: android/latest
  APK_PUBLIC_BASE_URL: ${{ secrets.APK_PUBLIC_BASE_URL }}
  APK_R2_BUCKET: ${{ secrets.APK_R2_BUCKET }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  build:
    name: Build ${{ github.event.inputs.build_type || 'release' }} APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate mobile backend configuration
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "VITE_API_URL secret is missing. Set it to your production backend API URL, for example https://carefam-00c1641bcdf9.herokuapp.com/api"
            exit 1
          fi

          if echo "$VITE_API_URL" | grep -Eiq 'localhost|127\.0\.0\.1|10\.0\.2\.2'; then
            echo "VITE_API_URL points to a local address. Release APKs must use a public backend URL."
            exit 1
          fi

          if [ -z "$VITE_WS_URL" ]; then
            echo "VITE_WS_URL secret is missing. Set it to your production websocket URL, for example wss://carefam-00c1641bcdf9.herokuapp.com/inventory"
            exit 1
          fi

          if echo "$VITE_WS_URL" | grep -Eiq 'localhost|127\.0\.0\.1|10\.0\.2\.2'; then
            echo "VITE_WS_URL points to a local address. Release APKs must use a public websocket URL."
            exit 1
          fi

      - name: Build web assets
        run: pnpm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
          VITE_ENABLE_OFFLINE: ${{ secrets.VITE_ENABLE_OFFLINE || 'true' }}
          VITE_ENABLE_LIVE_UPDATES: ${{ secrets.VITE_ENABLE_LIVE_UPDATES || 'true' }}
          VITE_LIVE_UPDATE_CHANNEL: ${{ secrets.VITE_LIVE_UPDATE_CHANNEL || 'production' }}
          VITE_ANDROID_VERSION_CODE: ${{ env.ANDROID_VERSION_CODE }}
          VITE_ANDROID_VERSION_NAME: ${{ env.ANDROID_VERSION_NAME }}
          VITE_APK_UPDATE_MANIFEST_URL: ${{ secrets.VITE_APK_UPDATE_MANIFEST_URL || env.APK_MANIFEST_URL }}

      - name: Sync Capacitor to Android
        run: pnpm exec cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      # ── Release signing setup ──────────────────────────────────────────────
      - name: Decode keystore from secret
        if: env.BUILD_TYPE == 'release'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 --decode > android/release-key.jks

      - name: Write keystore.properties
        if: env.BUILD_TYPE == 'release'
        run: |
          cat > android/keystore.properties << EOF
          storeFile=../release-key.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build signed release APK
        if: env.BUILD_TYPE == 'release'
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_VERSION_CODE: ${{ env.ANDROID_VERSION_CODE }}
          ANDROID_VERSION_NAME: ${{ env.ANDROID_VERSION_NAME }}

      - name: Build debug APK
        if: env.BUILD_TYPE == 'debug'
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_VERSION_CODE: ${{ env.ANDROID_VERSION_CODE }}
          ANDROID_VERSION_NAME: ${{ env.ANDROID_VERSION_NAME }}

      - name: Prepare public APK release files
        if: env.BUILD_TYPE == 'release'
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/caf-pharmacy-release.apk

          if [ -n "$APK_PUBLIC_BASE_URL" ]; then
            APK_DOWNLOAD_URL="${APK_PUBLIC_BASE_URL%/}/$R2_APK_KEY_PREFIX/caf-pharmacy-release.apk"
          else
            APK_DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/android-latest/caf-pharmacy-release.apk"
          fi

          cat > android/app/build/outputs/apk/release/apk-update.json << EOF
          {
            "versionCode": $ANDROID_VERSION_CODE,
            "versionName": "$ANDROID_VERSION_NAME",
            "downloadUrl": "$APK_DOWNLOAD_URL",
            "releaseNotes": "A new CAREFARM POS Android APK is available. Download it, then confirm the install when Android prompts you.",
            "mandatory": false
          }
          EOF

      - name: Publish APK to Cloudflare R2
        if: env.BUILD_TYPE == 'release' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != '' && env.APK_R2_BUCKET != ''
        run: |
          pnpm exec wrangler r2 object put "$APK_R2_BUCKET/$R2_APK_KEY_PREFIX/caf-pharmacy-release.apk" \
            --file android/app/build/outputs/apk/release/caf-pharmacy-release.apk \
            --content-type application/vnd.android.package-archive \
            --cache-control "public, max-age=31536000, immutable" \
            --remote

          pnpm exec wrangler r2 object put "$APK_R2_BUCKET/$R2_APK_KEY_PREFIX/apk-update.json" \
            --file android/app/build/outputs/apk/release/apk-update.json \
            --content-type application/json \
            --cache-control "no-store" \
            --remote

      # ── Artifacts ─────────────────────────────────────────────────────────
      - name: Upload signed release APK
        if: env.BUILD_TYPE == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: CAF-Pharmacy-release-${{ github.run_number }}
          path: |
            android/app/build/outputs/apk/release/caf-pharmacy-release.apk
            android/app/build/outputs/apk/release/apk-update.json
          retention-days: 30

      - name: Publish public APK release
        if: env.BUILD_TYPE == 'release' && github.ref == 'refs/heads/main' && env.APK_PUBLIC_BASE_URL == ''
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN || github.token }}
        run: |
          gh release delete android-latest --yes --cleanup-tag || true
          gh release create android-latest \
            android/app/build/outputs/apk/release/caf-pharmacy-release.apk \
            android/app/build/outputs/apk/release/apk-update.json \
            --target "$GITHUB_SHA" \
            --title "CAREFARM POS Android $ANDROID_VERSION_NAME" \
            --notes "Release APK build $ANDROID_VERSION_CODE from $GITHUB_SHA." \
            --latest

      - name: Upload debug APK
        if: env.BUILD_TYPE == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: CAF-Pharmacy-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # ── Capgo live update (optional) ──────────────────────────────────────
      - name: Validate Capgo deploy configuration
        if: github.event.inputs.upload_to_capgo == 'true'
        run: |
          if [ -z "$CAPGO_API_KEY" ]; then
            echo "CAPGO_API_KEY secret is missing."
            exit 1
          fi
          if [ -z "$CAPGO_APP_ID" ]; then
            echo "CAPGO_APP_ID is missing."
            exit 1
          fi
          if [ -z "$CAPGO_CHANNEL" ]; then
            echo "CAPGO_CHANNEL is missing."
            exit 1
          fi
          echo "Capgo deploy target: app=$CAPGO_APP_ID channel=$CAPGO_CHANNEL"
        env:
          CAPGO_API_KEY: ${{ secrets.CAPGO_API_KEY }}
          CAPGO_APP_ID: ${{ secrets.CAPGO_APP_ID || vars.CAPGO_APP_ID || 'com.caf.pharmacy' }}
          CAPGO_CHANNEL: ${{ secrets.VITE_LIVE_UPDATE_CHANNEL || vars.VITE_LIVE_UPDATE_CHANNEL || 'production' }}

      - name: Publish web bundle to Capgo
        if: github.event.inputs.upload_to_capgo == 'true'
        run: |
          npx @capgo/cli@latest bundle upload "$CAPGO_APP_ID" \
            --channel "$CAPGO_CHANNEL" \
            --path dist \
            --bundle "${ANDROID_VERSION_CODE}.0.0" \
            --apikey "$CAPGO_API_KEY" \
            --no-key \
            --version-exists-ok \
            --verbose
        env:
          CAPGO_API_KEY: ${{ secrets.CAPGO_API_KEY }}
          CAPGO_APP_ID: ${{ secrets.CAPGO_APP_ID || vars.CAPGO_APP_ID || 'com.caf.pharmacy' }}
          CAPGO_CHANNEL: ${{ secrets.VITE_LIVE_UPDATE_CHANNEL || vars.VITE_LIVE_UPDATE_CHANNEL || 'production' }}

      # ── Cleanup secrets ────────────────────────────────────────────────────
      - name: Remove keystore from runner
        if: always() && env.BUILD_TYPE == 'release'
        run: |
          rm -f android/release-key.jks
          rm -f android/keystore.properties
